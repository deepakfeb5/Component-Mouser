<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BOM Viewer</title>

    style.css
</head>
<body>

<header>
    <h1>Component Mouser Viewer</h1>
</header>

<main>

    <!-- Total BOM COST -->
    <section class="summary">
        <h2>📊 Total BOM Cost</h2>
        <div id="totalCost" class="cost-box">$0.00</div>
        <button id="downloadBtn" class="download-btn">Download Results CSV</button>
    </section>

    <!-- SEARCH -->
    <input id="searchInput" class="search-box" placeholder="Search part number, manufacturer…">

    <!-- BOM TABLE -->
    <section>
        <h2>📦 Bill of Materials</h2>
        <div id="bomTable">Loading...</div>
    </section>

</main>

script.js</script>

</body>
</html>
