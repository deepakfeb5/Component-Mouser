<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Mouser – Dashboard</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Component Mouser Viewer</h1>
        <p>Static HTML site powered by GitHub Pages</p>
    </header>

    <main>
        <!-- BOM Section -->
        <section>
            <h2>📦 Bill of Materials (BOM.csv)</h2>
            <div id="bomTable" style="margin-bottom: 40px;">Loading BOM...</div>
        </section>

        <!-- Requirements Section -->
        <section>
            <h2>📄 requirements.txt</h2>
            <pre id="reqText" style="background:#f5f5f5; padding:15px;">Loading...</pre>
        </section>

        <!-- app.py Section -->
        <section style="margin-top: 40px;">
            <h2>🐍 app.py (Static View Only)</h2>
            <pre id="appCode" style="background:#f5f5f5; padding:15px;">Loading...</pre>
        </section>

    </main>

    <footer style="margin-top:50px; text-align:center; padding:10px;">
        <p>© 2026 Component-Mouser • Static GitHub Pages Deployment</p>
    </footer>

    <!-- Link Script -->
    <script src="script.js"></script>

</body>
</html>
